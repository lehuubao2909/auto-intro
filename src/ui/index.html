<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AutoIntro</title>
<style>
  :root { --bg:#080B12; --elev:#10151F; --text:#F4F7FB; --dim:#9AA7B8; --accent:#41A3EF; --accent2:#FCCE50; --line:#ffffff14; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,system-ui,"Segoe UI",sans-serif; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 40px 24px 80px; }
  header h1 { font-size:34px; font-weight:800; letter-spacing:-1px; margin:0; }
  header h1 .a { color:var(--accent); }
  .repo { color:var(--dim); font-size:14px; margin:6px 0 24px; word-break:break-all; }
  .btn { padding:13px 26px; border:none; border-radius:999px; background:var(--accent); color:#001; font-weight:700; font-size:15px; cursor:pointer; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }
  .btn.secondary { background:transparent; color:var(--text); border:1px solid var(--line); }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .card { background:var(--elev); border:1px solid var(--line); border-radius:16px; padding:20px; margin-top:22px; }
  .log { font-family:ui-monospace,Menlo,monospace; font-size:13px; line-height:1.7; max-height:200px; overflow:auto; }
  .log .stage { color:var(--accent); } .log .warn { color:var(--accent2); } .log .error { color:#ff6b6b; }
  video { width:100%; border-radius:12px; margin-top:8px; background:#000; }
  textarea { width:100%; min-height:300px; background:#0c111b; color:var(--text); border:1px solid var(--line); border-radius:12px; padding:14px; font-family:ui-monospace,Menlo,monospace; font-size:12.5px; line-height:1.5; }
  .muted { color:var(--dim); font-size:13px; }
  h3 { margin:0 0 6px; font-size:18px; } h3 .hint { font-weight:400; font-size:13px; color:var(--dim); }
  a.dl { color:var(--accent); text-decoration:none; font-weight:600; }
  details { margin-top:12px; } summary { cursor:pointer; color:var(--dim); }
</style>
</head>
<body>
<div class="wrap">
  <header><h1>Auto<span class="a">Intro</span></h1></header>
  <div class="repo">📁 <span id="repo">__REPO__</span></div>

  <div class="row">
    <button class="btn" id="analyze">Analyze project</button>
    <span class="muted" id="status">Ready.</span>
  </div>

  <div class="card">
    <h3>Progress</h3>
    <div class="log" id="log"><span class="muted">Click “Analyze project” — you’ll review a brief before the trailer renders.</span></div>
  </div>

  <div class="card" id="briefCard" style="display:none">
    <h3>Project brief <span class="hint">— edit anything, then approve. This is what the trailer is built from.</span></h3>
    <textarea id="brief" spellcheck="false"></textarea>
    <div class="row" style="margin-top:12px">
      <button class="btn" id="approve">Approve &amp; generate trailer</button>
      <span class="muted" id="briefStatus"></span>
    </div>
  </div>

  <div class="card" id="preview" style="display:none">
    <h3>Preview</h3>
    <video id="video" controls></video>
    <div class="row" style="margin-top:12px"><a class="dl" id="download" href="#" download="trailer.mp4">⬇ Download .mp4</a></div>
    <details>
      <summary>Edit storyboard &amp; re-render</summary>
      <textarea id="sb" spellcheck="false"></textarea>
      <div class="row" style="margin-top:10px"><button class="btn secondary" id="rerender">Re-render</button><span class="muted" id="sbstatus"></span></div>
    </details>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const log = $("log");
let bust = 0;

function addLog(e) {
  if (log.querySelector(".muted")) log.innerHTML = "";
  const cls = e.status === "error" ? "error" : e.status === "warn" ? "warn" : "stage";
  const d = document.createElement("div");
  d.innerHTML = `<span class="${cls}">[${e.stage}]</span> ${e.message}`;
  log.appendChild(d); log.scrollTop = log.scrollHeight;
}
function setBusy(on, msg) { $("analyze").disabled = on; $("approve").disabled = on; $("rerender").disabled = on; if (msg) $("status").textContent = msg; }

async function showBrief() {
  const r = await fetch("/api/brief");
  if (!r.ok) return;
  $("brief").value = JSON.stringify(await r.json(), null, 2);
  $("briefCard").style.display = "block";
  $("status").textContent = "Review the brief, then approve.";
}
function showVideo() {
  bust++; $("preview").style.display = "block";
  const url = `/artifact/trailer.mp4?t=${bust}`;
  $("video").src = url; $("download").href = url;
  fetch("/api/storyboard").then(r => r.ok && r.text().then(t => $("sb").value = t));
}

new EventSource("/api/events").onmessage = (m) => {
  const e = JSON.parse(m.data);
  addLog(e);
  if (e.status === "error") { setBusy(false, "Failed."); return; }
  if (e.stage === "brief" && e.status === "ok") { setBusy(false); showBrief(); }
  if (e.stage === "done" && e.status === "ok") { setBusy(false, "Done."); showVideo(); }
};

$("analyze").onclick = async () => {
  log.innerHTML = ""; $("briefCard").style.display = "none"; $("preview").style.display = "none";
  setBusy(true, "Analyzing…");
  const r = await fetch("/api/analyze", { method: "POST" });
  if (r.status === 409) setBusy(false, "Busy.");
};

$("approve").onclick = async () => {
  let brief; try { brief = JSON.parse($("brief").value); } catch { $("briefStatus").textContent = "Invalid JSON."; return; }
  $("briefStatus").textContent = "Saving…";
  const s = await fetch("/api/brief", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ brief }) });
  const sj = await s.json();
  if (!s.ok) { $("briefStatus").textContent = (sj.details || [sj.error]).join("; "); return; }
  $("briefStatus").textContent = ""; setBusy(true, "Generating…"); log.innerHTML = "";
  await fetch("/api/approve", { method: "POST" });
};

$("rerender").onclick = async () => {
  let parsed; try { parsed = JSON.parse($("sb").value); } catch { $("sbstatus").textContent = "Invalid JSON."; return; }
  $("sbstatus").textContent = ""; setBusy(true, "Re-rendering…"); log.innerHTML = "";
  const r = await fetch("/api/storyboard", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ storyboard: parsed }) });
  if (!r.ok) { const j = await r.json(); setBusy(false); $("sbstatus").textContent = (j.details || [j.error]).join("; "); }
};
</script>
</body>
</html>
